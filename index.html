<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Video Studio</title>
    <style>
        :root { --primary: #8b5cf6; --secondary: #ec4899; --bg-color: #0f172a; --text-main: #f8fafc; --text-muted: #94a3b8; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 40px 20px; display: flex; justify-content: center; background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a); min-height: 100vh; }
        .container { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); padding: 35px; border-radius: 20px; width: 100%; max-width: 550px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        h2 { text-align: center; margin-top: 0; margin-bottom: 30px; font-size: 28px; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: var(--text-muted); }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #334155; background-color: rgba(15, 23, 42, 0.6); color: white; box-sizing: border-box; font-size: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .upload-box { position: relative; border: 2px dashed #475569; border-radius: 12px; background: rgba(15, 23, 42, 0.4); height: 120px; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
        .preview-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 1; }
        .remove-btn { position: absolute; top: 8px; right: 8px; background: #ef4444; color: white; width: 26px; height: 26px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 10; }
        
        button.submit-btn, a.download-btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; display: block; box-sizing: border-box; }
        button.submit-btn { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; }
        button.submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        a.download-btn { background: linear-gradient(to right, #10b981, #059669); color: white; text-align: center; text-decoration: none; display: none; }
        a.download-btn:hover { box-shadow: 0 10px 20px -10px #10b981; }

        #response-box { margin-top: 25px; padding: 20px; border-radius: 10px; background-color: rgba(0,0,0,0.3); display: none; font-size: 14px; border-left: 4px solid var(--primary); text-align: center; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #result-video { width: 100%; border-radius: 10px; margin-top: 15px; display: none; border: 2px solid var(--primary); background-color: black; }
    </style>
</head>
<body>

    <div class="container">
        <h2>AI Pro Video Studio</h2>
        <form id="videoForm">
            <div class="form-group"><label>API Key Leonardo:</label><input type="password" id="apiKey" name="apiKey" required></div>
            <div class="form-group">
                <label>Model AI Video:</label>
                <select name="model" id="modelSelect" required>
                    <option value="kling-3.0">Kling 3.0</option>
                    <option value="seedance-2.0">Seedance 2.0</option>
                    <option value="VEO3_1">Google Veo 3.1</option>
                </select>
            </div>
            <div class="form-group"><label>Prompt:</label><textarea name="prompt" required></textarea></div>
            
            <div class="form-group">
                <label>Gambar 1 (Awal - Wajib):</label>
                <div class="upload-box">
                    <span id="text1">Klik Upload</span>
                    <input type="file" id="image1" name="images" accept="image/*" class="file-input" required>
                    <img id="preview1" class="preview-img"><div class="remove-btn" id="remove1">X</div>
                </div>
            </div>

            <div class="form-group">
                <label>Gambar 2 (Akhir - Opsional):</label>
                <div class="upload-box">
                    <span id="text2">Klik Upload</span>
                    <input type="file" id="image2" name="images" accept="image/*" class="file-input">
                    <img id="preview2" class="preview-img"><div class="remove-btn" id="remove2">X</div>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Durasi:</label>
                    <select name="duration" id="durationSelect"></select>
                </div>
                <div class="form-group">
                    <label>Resolusi:</label>
                    <select name="resolution" required>
                        <option value="RESOLUTION_1080">1080p (FHD)</option>
                        <option value="RESOLUTION_720">720p (HD)</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">Mulai Generate Video</button>
        </form>

        <div id="response-box">
            <div id="status-text">Memproses...</div>
            <div class="loader" id="loading-spinner"></div>
            <video id="result-video" controls></video>
            <a id="downloadBtn" href="#" download="Hasil_Video_AI.mp4" class="download-btn">⬇️ Download Video</a>
        </div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        if (localStorage.getItem('saved_api_key')) apiKeyInput.value = localStorage.getItem('saved_api_key');

        function setupImagePreview(inputId, previewId, textId, removeId) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    document.getElementById(previewId).src = URL.createObjectURL(file);
                    document.getElementById(previewId).style.display = 'block';
                    document.getElementById(removeId).style.display = 'flex';
                    document.getElementById(textId).style.display = 'none';
                }
            });
            document.getElementById(removeId).addEventListener('click', function(e) {
                e.preventDefault(); document.getElementById(inputId).value = '';
                document.getElementById(previewId).style.display = 'none';
                this.style.display = 'none'; document.getElementById(textId).style.display = 'block';
            });
        }
        
        setupImagePreview('image1', 'preview1', 'text1', 'remove1');
        setupImagePreview('image2', 'preview2', 'text2', 'remove2');

        const modelSelect = document.getElementById('modelSelect');
        const durationSelect = document.getElementById('durationSelect');
        
        function updateDurationOptions() {
            durationSelect.innerHTML = '';
            if (modelSelect.value === 'VEO3_1') { 
                durationSelect.add(new Option('5 Detik', '5')); 
                durationSelect.add(new Option('8 Detik', '8')); 
            } else { 
                durationSelect.add(new Option('5 Detik', '5')); 
                durationSelect.add(new Option('10 Detik', '10')); 
                durationSelect.add(new Option('15 Detik', '15')); 
            }
        }
        modelSelect.addEventListener('change', updateDurationOptions); 
        updateDurationOptions();

        async function checkJobStatus(jobId, apiKey, backendUrl) {
            const statusText = document.getElementById('status-text');
            const videoPlayer = document.getElementById('result-video');
            const spinner = document.getElementById('loading-spinner');
            const downloadBtn = document.getElementById('downloadBtn');

            try {
                const response = await fetch(`${backendUrl.replace('/generate-video', '/check-status')}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jobId: jobId, apiKey: apiKey })
                });
                const data = await response.json();

                if (data.status === 'COMPLETE' && data.video_url) {
                    statusText.innerHTML = `<span style="color: #4ade80; font-weight:bold;">Video Berhasil Dibuat! 🎉</span>`;
                    spinner.style.display = 'none';
                    videoPlayer.src = data.video_url;
                    videoPlayer.style.display = 'block';
                    downloadBtn.href = data.video_url;
                    downloadBtn.style.display = 'block';
                    document.getElementById('submitBtn').disabled = false;
                } else if (data.status === 'FAILED') {
                    statusText.innerHTML = `<span style="color: #f87171;">Pembuatan video gagal dari server.</span>`;
                    spinner.style.display = 'none';
                    document.getElementById('submitBtn').disabled = false;
                } else {
                    statusText.innerHTML = `Status: <span style="color: #38bdf8;">${data.status}...</span><br>Estimasi 1-3 menit. Jangan tutup halaman ini.`;
                    setTimeout(() => checkJobStatus(jobId, apiKey, backendUrl), 8000); 
                }
            } catch (error) {
                statusText.innerHTML = "Gagal mengecek status. Coba periksa koneksi.";
            }
        }

        document.getElementById('videoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            localStorage.setItem('saved_api_key', apiKeyInput.value);
            const submitBtn = document.getElementById('submitBtn');
            const responseBox = document.getElementById('response-box');
            const statusText = document.getElementById('status-text');
            const spinner = document.getElementById('loading-spinner');
            const videoPlayer = document.getElementById('result-video');
            const downloadBtn = document.getElementById('downloadBtn');
            const formData = new FormData(e.target);
            
            submitBtn.disabled = true;
            responseBox.style.display = 'block';
            videoPlayer.style.display = 'none';
            downloadBtn.style.display = 'none'; 
            spinner.style.display = 'block';
            statusText.innerHTML = "Mengirim data ke server...";

            const BACKEND_URL = "https://backend-video-production-b350.up.railway.app/api/generate-video"; 

            try {
                const response = await fetch(BACKEND_URL, { method: 'POST', body: formData });
                const data = await response.json();
                
                if(data.success) {
                    statusText.innerHTML = `Job ID diterima: ${data.job_id}<br>Sedang memproses video...`;
                    checkJobStatus(data.job_id, apiKeyInput.value, BACKEND_URL);
                } else {
                    statusText.innerHTML = `<span style="color: #f87171;">Gagal:</span> ${data.error}`;
                    spinner.style.display = 'none'; submitBtn.disabled = false;
                }
            } catch (error) {
                statusText.innerHTML = "Error server."; spinner.style.display = 'none'; submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
