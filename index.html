<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: #1e1e1e; padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 20px; font-size: 22px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: #a5b4fc; }
        input[type="text"], input[type="password"], input[type="file"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background-color: #2a2a2a; color: white; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background-color: #6366f1; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #4f46e5; }
        #response-box { margin-top: 20px; padding: 15px; border-radius: 8px; background-color: #2a2a2a; display: none; font-size: 14px; word-break: break-all; border-left: 4px solid #6366f1; }
    </style>
</head>
<body>

    <div class="container">
        <h2>AI Video Generator</h2>
        <form id="videoForm">
            <div class="form-group">
                <label>Leonardo AI API Key:</label>
                <input type="password" id="apiKey" name="apiKey" placeholder="Masukkan API Key di sini" required>
            </div>

            <div class="form-group">
                <label>Karakter 1 (Gambar):</label>
                <input type="file" id="image1" name="images" accept="image/*" required>
            </div>
            
            <div class="form-group">
                <label>Karakter 2 (Gambar):</label>
                <input type="file" id="image2" name="images" accept="image/*" required>
            </div>

            <div class="form-group">
                <label>Pilih Rasio Video:</label>
                <select name="ratio" required>
                    <option value="16:9">16:9 (Landscape - YouTube)</option>
                    <option value="9:16">9:16 (Portrait - TikTok/Reels)</option>
                    <option value="1:1">1:1 (Square - Instagram)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Pilih Kualitas:</label>
                <select name="quality" required>
                    <option value="high">High Quality</option>
                    <option value="standard">Standard Quality</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">Generate Video</button>
        </form>

        <div id="response-box"></div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        if (localStorage.getItem('saved_api_key')) {
            apiKeyInput.value = localStorage.getItem('saved_api_key');
        }

        document.getElementById('videoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            localStorage.setItem('saved_api_key', apiKeyInput.value);

            const submitBtn = document.getElementById('submitBtn');
            const responseBox = document.getElementById('response-box');
            const formData = new FormData(e.target);
            
            submitBtn.innerText = "Memproses...";
            submitBtn.disabled = true;
            responseBox.style.display = 'block';
            responseBox.innerHTML = "Mengirim data ke server...";

            // Link Railway sudah dimasukkan secara otomatis di sini
            const BACKEND_URL = "https://backend-video-production-b350.up.railway.app/api/generate-video"; 

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if(data.success) {
                    responseBox.innerHTML = `<span style="color: #4ade80;">Berhasil!</span><br>Pesan: ${data.message}<br>Status: ${data.data.status}`;
                } else {
                    responseBox.innerHTML = `<span style="color: #f87171;">Gagal:</span> ${data.error}`;
                }
            } catch (error) {
                responseBox.innerHTML = `<span style="color: #f87171;">Error:</span> Tidak dapat terhubung ke server Railway.`;
            } finally {
                submitBtn.innerText = "Generate Video";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
